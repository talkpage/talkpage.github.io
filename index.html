<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkpage</title>
    <style>
        /* --- THEME VARIABLES (CSS ENGINE) --- */
        :root {
            --accent: #F6A800; 
            --bg-main: #FFFFFF;
            --bg-sidebar: #F2F2F2;
            --bg-input: #FFFFFF;
            --border-dark: #222222;
            --border-light: #DDDDDD;
            --text-dark: #111111;
            --text-muted: #777777;
            --msg-sent-bg: #F6A800;
            --msg-sent-txt: #000000;
            --msg-recv-bg: #F2F2F2;
            --msg-recv-txt: #111111;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --radius-btn: 4px;
            --radius-bubble: 18px;
            --glow: none;
        }

        body.theme-dark {
            --accent: #BB86FC; 
            --bg-main: #121212;
            --bg-sidebar: #1E1E1E;
            --bg-input: #2C2C2C;
            --border-dark: #333333;
            --border-light: #2A2A2A;
            --text-dark: #E0E0E0;
            --text-muted: #888888;
            --msg-sent-bg: #BB86FC;
            --msg-sent-txt: #000000;
            --msg-recv-bg: #2C2C2C;
            --msg-recv-txt: #E0E0E0;
        }

        body.theme-stranger {
            --accent: #FF0000; 
            --bg-main: #050000;
            --bg-sidebar: #0A0000;
            --bg-input: #1A0000;
            --border-dark: #FF0000;
            --border-light: #550000;
            --text-dark: #FF0000;
            --text-muted: #AA0000;
            --msg-sent-bg: #550000;
            --msg-sent-txt: #FF0000;
            --msg-recv-bg: #1A0000;
            --msg-recv-txt: #FF0000;
            --glow: 0 0 8px rgba(255,0,0,0.6);
        }

        /* --- BASE STYLES --- */
        body, input, button, textarea { 
            font-family: var(--font-main); 
            -webkit-font-smoothing: antialiased; 
            color: var(--text-dark);
            text-shadow: var(--glow);
        }

        h1, h2, h3, .logo { font-weight: 700; letter-spacing: -0.5px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }

        /* --- AUTH & ONBOARDING --- */
        #auth-screen {
            position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); display: flex; align-items: center; justify-content: center;
        }
        .auth-container { width: 100%; max-width: 340px; }
        .logo-large { font-size: 48px; margin-bottom: 30px; border-bottom: 4px solid var(--border-dark); padding-bottom: 10px; display: inline-block; box-shadow: var(--glow); }

        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 14px 0; border: none; border-bottom: 2px solid var(--border-light);
            font-size: 16px; outline: none; transition: border-color 0.2s; background: transparent; margin-bottom: 15px; resize: none; color: var(--text-dark);
        }
        input:focus, textarea:focus { border-bottom-color: var(--accent); }

        .btn-primary {
            width: 100%; padding: 14px; background: var(--border-dark); color: var(--bg-main); border: none;
            border-radius: var(--radius-btn); font-weight: bold; cursor: pointer; font-size: 15px;
            transition: 0.2s; box-shadow: var(--glow);
        }
        .btn-primary:hover { background: var(--accent); color: var(--bg-main); }
        .btn-outline { background: transparent; color: var(--text-dark); border: 2px solid var(--border-dark); }
        .btn-outline:hover { background: var(--border-dark); color: var(--bg-main); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .pic-upload-container { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .pic-preview { width: 60px; height: 60px; border-radius: 50%; background: var(--border-light); display: flex; align-items: center; justify-content: center; overflow: hidden; font-weight: bold; font-size: 20px; border: 2px solid var(--border-dark); text-transform: uppercase;}
        .pic-preview img { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn-fake { padding: 8px 12px; border: 2px solid var(--border-dark); font-size: 13px; font-weight: bold; cursor: pointer; display: inline-block; box-shadow: var(--glow); }

        /* --- APP LAYOUT --- */
        #app-layout { display: none; height: 100vh; width: 100vw; background: var(--bg-main); }
        #app-layout.active { display: flex; }

        #sidebar { width: 340px; border-right: 2px solid var(--border-dark); display: flex; flex-direction: column; background: var(--bg-sidebar); }
        
        .sb-header { height: 84px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-dark); background: var(--bg-main); flex-shrink: 0;}
        .sb-title-area { display: flex; flex-direction: column; justify-content: center; }
        .sb-title-area h1 { font-size: 22px; line-height: 1.1; margin-bottom: 2px; }
        .sb-title-area span { font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .sb-actions { display: flex; align-items: center; gap: 12px; }
        
        .theme-btn { background: none; border: none; color: var(--border-dark); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .theme-btn:hover { color: var(--accent); transform: scale(1.1); }

        .my-profile-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--border-dark); color: var(--bg-main); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; cursor: pointer; overflow: hidden; text-transform: uppercase; transition: opacity 0.2s; border: 1px solid var(--border-dark); box-shadow: var(--glow);}
        .my-profile-icon:hover { opacity: 0.8; }
        .my-profile-icon img { width: 100%; height: 100%; object-fit: cover; }
        .new-chat-btn { background: none; border: none; font-size: 30px; cursor: pointer; font-weight: bold; color: var(--text-dark); line-height: 1; margin-top: -4px;}
        
        .conv-list { flex: 1; overflow-y: auto; position: relative; }
        .conv-item { padding: 15px 25px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid var(--border-light); transition: background 0.2s; }
        .conv-item:hover { background: var(--bg-main); opacity: 0.9; }
        .conv-item.active { background: var(--bg-main); border-left: 6px solid var(--accent); }

        .avatar-container { position: relative; margin-right: 15px; flex-shrink: 0; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--border-dark); display: flex; align-items: center; justify-content: center; color: var(--bg-main); font-weight: bold; font-size: 18px; text-transform: uppercase; overflow: hidden; box-shadow: var(--glow);}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .conv-info { flex: 1; overflow: hidden; }
        .conv-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-preview { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #empty-sidebar-hint { padding: 40px 20px; text-align: center; color: var(--text-muted); font-weight: bold; position: relative; }
        
        #chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        #no-chat-screen { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-sidebar); flex-direction: column; }
        #active-chat-screen { flex: 1; display: none; flex-direction: column; } 

        .chat-header { height: 84px; border-bottom: 2px solid var(--border-dark); padding: 0 30px; display: flex; align-items: center; justify-content: space-between; flex-shrink:0; background: var(--bg-main);}
        .clickable-name { cursor: pointer; transition: color 0.2s; }
        .clickable-name:hover { color: var(--accent); }
        
        #messages-view { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.received { align-self: flex-start; align-items: flex-start; }
        
        .sender-name { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; margin-left: 4px; font-weight: bold; cursor: pointer; }
        .sender-name:hover { color: var(--accent); text-decoration: underline; }
        
        .bubble { padding: 12px 18px; border-radius: var(--radius-bubble); font-size: 15px; line-height: 1.4; box-shadow: var(--glow); word-break: break-word;}
        .sent .bubble { background: var(--msg-sent-bg); color: var(--msg-sent-txt); border-bottom-right-radius: 4px; }
        .received .bubble { background: var(--msg-recv-bg); color: var(--msg-recv-txt); border-bottom-left-radius: 4px; border: 1px solid var(--border-light); }
        .timestamp { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        .input-box { padding: 20px 30px; border-top: 2px solid var(--border-dark); display: flex; align-items: center; gap: 15px; background: var(--bg-sidebar); flex-shrink:0; }
        
        .attach-icon-label { cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .attach-icon-label:hover { color: var(--accent); }

        #msg-input { 
            flex: 1; height: 48px; padding: 0 20px; border-radius: 30px; 
            border: 1px solid var(--border-dark); background: var(--bg-input); 
            color: var(--text-dark); outline: none; font-size: 15px; margin: 0; box-shadow: var(--glow);
        }
        
        #send-btn {
            width: auto; flex-shrink: 0; height: 48px; margin: 0; padding: 0 24px;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
        }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 4000; display: none; align-items: center; justify-content: center; }
        .modal-card { width: 100%; max-width: 450px; padding: 30px; background: var(--bg-main); border-radius: var(--radius-btn); border: 2px solid var(--border-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--glow); max-height: 90vh; overflow-y: auto; }
        .user-pill { display: inline-flex; align-items: center; background: var(--border-dark); color: var(--bg-main); padding: 8px 14px; border-radius: 20px; margin: 4px 4px 4px 0; font-size: 13px; font-weight: bold; }
        
        .search-container { position: relative; margin-bottom: 20px; }
        #search-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-main); border: 2px solid var(--border-dark); border-top: none; z-index: 10; max-height: 150px; overflow-y: auto; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-result { padding: 12px 15px; border-bottom: 1px solid var(--border-light); cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .search-result:last-child { border-bottom: none; }
        .search-result:hover { background: var(--bg-sidebar); }
        
        .theme-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .theme-card { padding: 15px; border: 2px solid var(--border-light); border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .theme-card:hover { border-color: var(--accent); background: var(--bg-sidebar); }

        .profile-view-pic { width: 100px; height: 100px; border-radius: 50%; background: var(--border-dark); color: var(--bg-main); font-size: 40px; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; overflow: hidden; border: 3px solid var(--border-dark); text-transform: uppercase; box-shadow: var(--glow);}
        .profile-view-pic img { width: 100%; height: 100%; object-fit: cover; }
        .kick-btn { background: none; border: none; color: #EE352E; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        /* Loading Overlay */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 9999; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: var(--text-dark); transition: opacity 0.5s;}
    </style>
</head>
<body>

    <div id="loading-overlay">Loading Talkpage...</div>

    <div id="auth-screen" style="display:none;">
        <div class="auth-container">
            <h1 class="logo-large">Talkpage</h1>
            
            <div id="step-1-auth">
                <p id="auth-error" style="color: #EE352E; font-size: 14px; display: none; margin-bottom: 10px; font-weight: bold;"></p>
                <input type="text" id="auth-u" placeholder="Username">
                <input type="password" id="auth-p" placeholder="Password" onkeypress="handleEnter(event, 'auth-login')">
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-primary" id="login-btn" onclick="authenticate('login')">Log In</button>
                    <button class="btn-primary btn-outline" id="signup-btn" onclick="authenticate('signup')">Sign Up</button>
                </div>
            </div>

            <div id="step-2-profile" style="display: none;">
                <h2 style="margin-bottom: 5px;">Set Up Profile</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Let people know who you are.</p>
                
                <div class="pic-upload-container">
                    <div class="pic-preview" id="setup-pic-preview">?</div>
                    <div>
                        <label for="setup-pic-input" class="upload-btn-fake">Upload Photo</label>
                        <input type="file" id="setup-pic-input" accept="image/*" style="display:none;" onchange="handleProfilePic(event, 'setup-pic-preview')">
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <input type="text" id="setup-fname" placeholder="First Name">
                    <input type="text" id="setup-lname" placeholder="Last Name">
                </div>
                <textarea id="setup-bio" placeholder="Write a short bio..." rows="3"></textarea>
                
                <button class="btn-primary" onclick="completeOnboarding()">Enter Talkpage</button>
            </div>
        </div>
    </div>

    <div id="app-layout">
        <div id="sidebar">
            <div class="sb-header">
                <div class="sb-title-area">
                    <h1>Talkpage</h1>
                    <span>Chats</span>
                </div>
                <div class="sb-actions">
                    <button class="theme-btn" onclick="toggleModal('theme-modal', true)" title="Settings & Themes">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                    <div class="my-profile-icon" id="my-profile-icon" onclick="viewProfile(currentUser)"></div>
                    <button class="new-chat-btn" onclick="toggleModal('new-chat-modal', true)">+</button>
                </div>
            </div>
            <div class="conv-list" id="conv-list"></div>
        </div>

        <div id="chat-area">
            <div id="no-chat-screen">
                <h2 style="color: var(--text-muted);">No Chat Selected</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-top:10px;">Select a conversation or start a new one.</p>
            </div>

            <div id="active-chat-screen">
                <div class="chat-header">
                    <div>
                        <h3 id="chat-title" class="clickable-name"></h3>
                        <p id="chat-subtitle" style="font-size: 13px; color: var(--text-muted);"></p>
                    </div>
                    <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; font-weight:bold;">Log Out</button>
                </div>
                
                <div id="messages-view"></div>
                
                <div class="input-box">
                    <label for="file-input" class="attach-icon-label" title="Attach Image">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </label>
                    <input type="file" id="file-input" style="display:none;" onchange="handleFileUpload(event)">
                    
                    <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="handleEnter(event, 'send')">
                    <button class="btn-primary" id="send-btn" onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="theme-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom: 20px; text-align: center;">Settings & Themes</h2>
            <div class="theme-grid">
                <div class="theme-card" onclick="setTheme('default')" style="background:#FFF; color:#000;">Light Mode</div>
                <div class="theme-card" onclick="setTheme('dark')" style="background:#121212; color:#FFF; border-color: #333;">Dark Mode</div>
                <div class="theme-card" onclick="setTheme('stranger')" style="background:#050000; color:#FF0000; border-color:#FF0000;">Stranger Things</div>
            </div>
            <button class="btn-primary btn-outline" style="border:none;" onclick="toggleModal('theme-modal', false)">Close</button>
        </div>
    </div>

    <div id="new-chat-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom: 10px;">New Conversation</h2>
            <div id="selected-users" style="margin-bottom: 15px;"></div>
            <div class="search-container">
                <input type="text" id="user-search" placeholder="Search users..." oninput="handleSearchInput(event)" autocomplete="off" style="border-bottom: 2px solid var(--border-dark); margin-bottom: 0;">
                <div id="search-dropdown"></div>
            </div>
            
            <div id="new-group-settings" style="display: none; margin-bottom: 20px; padding-top: 15px; border-top: 1px solid var(--border-light);">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px; font-weight:bold;">Group Chat Details</p>
                <div class="pic-upload-container" style="margin-bottom: 10px;">
                    <div class="pic-preview" id="group-pic-preview">G</div>
                    <div>
                        <label for="group-pic-input" class="upload-btn-fake">Set Group Photo</label>
                        <input type="file" id="group-pic-input" accept="image/*" style="display:none;" onchange="handleProfilePic(event, 'group-pic-preview')">
                    </div>
                </div>
                <input type="text" id="new-group-name" placeholder="Group Name">
            </div>

            <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="createChat()">Start</button>
                <button class="btn-primary btn-outline" onclick="toggleModal('new-chat-modal', false)">Cancel</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card" style="text-align: center;">
            <div class="profile-view-pic" id="pv-pic"></div>
            <h2 id="pv-name" style="margin-bottom: 5px;"></h2>
            <div id="pv-handle" style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;"></div>
            <div id="pv-bio" style="font-size: 15px; line-height: 1.5; margin-bottom: 25px; padding: 15px; background: var(--bg-sidebar); border-radius: 8px; text-align: left;"></div>
            
            <div id="edit-profile-form" style="display:none; text-align:left;">
                <div style="text-align:center; margin-bottom:15px;">
                    <label for="edit-pic-input" class="upload-btn-fake">Change Photo</label>
                    <input type="file" id="edit-pic-input" accept="image/*" style="display:none;" onchange="handleProfilePic(event, 'pv-pic')">
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="edit-fname" placeholder="First Name">
                    <input type="text" id="edit-lname" placeholder="Last Name">
                </div>
                <textarea id="edit-bio" rows="3"></textarea>
            </div>

            <button id="pv-edit-btn" class="btn-primary btn-outline" style="display:none; margin-bottom:10px;" onclick="enableProfileEdit()">Edit Profile</button>
            <button id="pv-save-btn" class="btn-primary" style="display:none; margin-bottom:10px;" onclick="saveProfileEdit()">Save Changes</button>
            <button class="btn-primary btn-outline" style="border:none;" onclick="toggleModal('profile-modal', false)">Close</button>
        </div>
    </div>

    <div id="group-details-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="text-align:center; margin-bottom:20px;">Group Settings</h2>
            <div class="pic-upload-container" style="justify-content:center;">
                <div class="profile-view-pic" id="gd-pic" style="width:80px; height:80px; margin:0;"></div>
                <div>
                    <label for="gd-pic-input" class="upload-btn-fake">Change Photo</label>
                    <input type="file" id="gd-pic-input" accept="image/*" style="display:none;" onchange="handleGroupPicEdit(event)">
                </div>
            </div>
            <input type="text" id="gd-name" placeholder="Group Name" style="text-align:center; font-weight:bold; font-size:18px;">
            <h3 style="font-size:14px; margin-top:20px; border-bottom:1px solid var(--border-light); padding-bottom:5px;">Members</h3>
            <div id="gd-members-list" style="margin-bottom:20px; max-height: 150px; overflow-y:auto;"></div>
            <button class="btn-primary" onclick="saveGroupDetails()">Save Changes</button>
            <button class="btn-primary btn-outline" style="margin-top:10px; border:none;" onclick="toggleModal('group-details-modal', false)">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, addDoc, onSnapshot, query, where, orderBy, serverTimestamp, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. FIREBASE CONFIGURATION
        const firebaseConfig = {
          apiKey: "AIzaSyCXbThxOKS_-gu6IB6S2EtgkcvdAf5fNAw",
          authDomain: "talkpage-5e2dd.firebaseapp.com",
          projectId: "talkpage-5e2dd",
          storageBucket: "talkpage-5e2dd.firebasestorage.app",
          messagingSenderId: "602639277356",
          appId: "1:602639277356:web:c17c4dfc0ceedef4aea089"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global State Variables
        let currentUser = null;
        let activeChatId = null;
        let usersCache = {}; // Replaces mockProfiles
        let chatsCache = []; // Replaces mockChats
        let usersDirectory = []; // Replaces mockDirectory
        
        let pendingSignUpUser = null;
        let tempPicData = null; 
        let groupMembers = [];
        let editingGroupChatId = null;
        
        // Unsubscribe functions for real-time listeners
        let unsubChats = null;
        let unsubMessages = null;

        // --- THEME ENGINE ---
        window.setTheme = function(themeName) {
            document.body.className = ''; 
            if (themeName !== 'default') document.body.classList.add(`theme-${themeName}`);
            toggleModal('theme-modal', false);
            localStorage.setItem('talkpage_theme', themeName); // Save theme memory
        };

        // Load saved theme
        const savedTheme = localStorage.getItem('talkpage_theme');
        if(savedTheme) window.setTheme(savedTheme);

        // --- AUTHENTICATION STATE LISTENER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in. Extract username from the dummy email
                currentUser = user.email.split('@')[0];
                
                // Check if they completed onboarding (do they have a profile?)
                const profileSnap = await getDoc(doc(db, "users", currentUser));
                
                if (profileSnap.exists()) {
                    // Fully onboarded! Load App.
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app-layout').classList.add('active');
                    
                    fetchDirectory(); // Get all users for search
                    listenToChats(); // Start syncing chats
                    
                    document.getElementById('my-profile-icon').innerHTML = getAvatarHTML(currentUser, profileSnap.data());
                } else {
                    // They created an account but haven't set up a profile yet
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('auth-screen').style.display = 'flex';
                    document.getElementById('step-1-auth').style.display = 'none';
                    document.getElementById('step-2-profile').style.display = 'block';
                    document.getElementById('setup-pic-preview').innerText = currentUser.charAt(0).toUpperCase();
                    pendingSignUpUser = currentUser;
                }
            } else {
                // User is signed out.
                currentUser = null;
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app-layout').classList.remove('active');
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('step-1-auth').style.display = 'block';
                document.getElementById('step-2-profile').style.display = 'none';
                
                if(unsubChats) unsubChats();
                if(unsubMessages) unsubMessages();
            }
        });

        // --- AUTHENTICATION ACTIONS ---
        window.authenticate = async function(action) {
            const u = document.getElementById('auth-u').value.trim().toLowerCase();
            const p = document.getElementById('auth-p').value.trim();
            const err = document.getElementById('auth-error');

            if (!u || !p) { err.innerText = "Please fill out both fields."; err.style.display = 'block'; return; }
            
            // We append @talkpage.com to satisfy Firebase Auth email requirement
            const email = `${u}@talkpage.com`;

            err.style.display = 'none';
            document.getElementById('login-btn').disabled = true;
            document.getElementById('signup-btn').disabled = true;

            try {
                if (action === 'login') {
                    await signInWithEmailAndPassword(auth, email, p);
                } else if (action === 'signup') {
                    await createUserWithEmailAndPassword(auth, email, p);
                    // onAuthStateChanged will catch this and route to Profile Setup
                }
            } catch (error) {
                if(error.code === 'auth/email-already-in-use') err.innerText = "Username taken! Try logging in.";
                else if(error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') err.innerText = "Invalid username or password.";
                else err.innerText = "Error: " + error.message;
                err.style.display = 'block';
                
                document.getElementById('login-btn').disabled = false;
                document.getElementById('signup-btn').disabled = false;
            }
        };

        window.logout = function() {
            signOut(auth).then(() => { location.reload(); });
        };

        // --- PROFILE ONBOARDING ---
        window.handleProfilePic = function(e, previewElementId) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    tempPicData = event.target.result; // Base64 string
                    document.getElementById(previewElementId).innerHTML = `<img src="${tempPicData}">`;
                };
                reader.readAsDataURL(file);
            }
        };

        window.completeOnboarding = async function() {
            const fname = document.getElementById('setup-fname').value.trim() || pendingSignUpUser;
            const lname = document.getElementById('setup-lname').value.trim() || "";
            const bio = document.getElementById('setup-bio').value.trim() || "No bio provided.";
            
            const now = new Date();
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const profileData = {
                fname: fname,
                lname: lname,
                bio: bio,
                pic: tempPicData,
                joined: `${months[now.getMonth()]} ${now.getFullYear()}`,
                username: pendingSignUpUser
            };

            // Save to Firestore
            await setDoc(doc(db, "users", pendingSignUpUser), profileData);
            
            // Reload page to trigger auth listener fresh
            location.reload();
        };

        // --- REAL-TIME DATABASE SYNCING ---

        // 1. Fetch all users for the search directory
        async function fetchDirectory() {
            const querySnapshot = await getDocs(collection(db, "users"));
            usersDirectory = [];
            querySnapshot.forEach((doc) => {
                usersCache[doc.id] = doc.data();
                usersDirectory.push(doc.id);
            });
        }

        // 2. Listen to Sidebar Chats
        function listenToChats() {
            const q = query(collection(db, "chats"), where("participants", "array-contains", currentUser), orderBy("updatedAt", "desc"));
            
            unsubChats = onSnapshot(q, (snapshot) => {
                chatsCache = [];
                snapshot.forEach((doc) => {
                    chatsCache.push({ id: doc.id, ...doc.data() });
                });
                renderSidebar();
                
                // If active chat was updated, refresh headers
                if(activeChatId) refreshActiveChatHeader();
            });
        }

        // 3. Render the Sidebar UI
        function renderSidebar() {
            const list = document.getElementById('conv-list');
            list.innerHTML = '';
            
            if (chatsCache.length === 0) {
                list.innerHTML = `<div id="empty-sidebar-hint"><div class="arrow-up">↑</div>Start a conversation here</div>`;
                return;
            }

            chatsCache.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'conv-item';
                if(chat.id === activeChatId) item.classList.add('active');
                item.onclick = () => openChat(chat.id);

                let chatTitle = chat.name;
                let avatarContent = chatTitle ? chatTitle.charAt(0).toUpperCase() : "G";

                if (chat.isGroup && chat.pic) {
                    avatarContent = `<img src="${chat.pic}">`;
                } else if (!chat.isGroup) {
                    const targetUser = chat.participants.find(p => p !== currentUser) || currentUser;
                    chatTitle = getFullName(targetUser);
                    avatarContent = getAvatarHTML(targetUser, usersCache[targetUser]);
                }

                const lastMsg = chat.lastMessage || "Start chatting...";

                item.innerHTML = `
                    <div class="avatar-container"><div class="avatar">${avatarContent}</div><div class="online-dot"></div></div>
                    <div class="conv-info"><div class="conv-name">${chatTitle}</div><div class="conv-preview">${lastMsg}</div></div>
                `;
                list.appendChild(item);
            });
        }

        // 4. Open a Chat and Listen to Messages
        window.openChat = function(chatId) {
            activeChatId = chatId;
            renderSidebar(); // refresh active highlight
            
            document.getElementById('no-chat-screen').style.display = 'none';
            document.getElementById('active-chat-screen').style.display = 'flex';
            
            refreshActiveChatHeader();

            // Stop listening to previous chat's messages
            if(unsubMessages) unsubMessages();

            // Listen to new chat's messages
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
            unsubMessages = onSnapshot(q, (snapshot) => {
                const view = document.getElementById('messages-view');
                view.innerHTML = '';
                let lastSender = null;

                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    const isMe = msg.sender === currentUser;
                    const wrapper = document.createElement('div');
                    wrapper.className = `msg-wrapper ${isMe ? 'sent' : 'received'}`;

                    let html = '';
                    
                    // Show names in group chats if it's not you and the sender changed
                    const chat = chatsCache.find(c => c.id === chatId);
                    if (chat.isGroup && !isMe && lastSender !== msg.sender) {
                        html += `<div class="sender-name" onclick="viewProfile('${msg.sender}')">${getFullName(msg.sender)}</div>`;
                    }
                    
                    html += `<div class="bubble">${msg.text}</div>`;
                    
                    // Format Timestamp
                    let timeStr = "Sending...";
                    if(msg.createdAt) {
                        const date = msg.createdAt.toDate();
                        let hours = date.getHours();
                        const ampm = hours >= 12 ? 'PM' : 'AM';
                        hours = hours % 12 || 12;
                        const mins = date.getMinutes().toString().padStart(2, '0');
                        timeStr = `${hours}:${mins} ${ampm}`;
                    }
                    html += `<div class="timestamp">${timeStr}</div>`;
                    
                    wrapper.innerHTML = html;
                    view.appendChild(wrapper);
                    lastSender = msg.sender;
                });
                view.scrollTop = view.scrollHeight;
            });
        };

        function refreshActiveChatHeader() {
            const chat = chatsCache.find(c => c.id === activeChatId);
            if(!chat) return;

            const titleEl = document.getElementById('chat-title');
            if (chat.isGroup) {
                titleEl.innerText = chat.name;
                titleEl.onclick = () => openGroupDetails(chat.id);
                document.getElementById('chat-subtitle').innerText = `${chat.participants.length} members`;
            } else {
                const targetUser = chat.participants.find(p => p !== currentUser) || currentUser;
                titleEl.innerText = getFullName(targetUser);
                titleEl.onclick = () => viewProfile(targetUser); 
                document.getElementById('chat-subtitle').innerText = `@${targetUser}`;
            }
        }

        // 5. Send a Message
        window.sendMsg = async function() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;

            input.value = ''; // clear instantly for UI feel

            await addDoc(collection(db, "chats", activeChatId, "messages"), {
                sender: currentUser,
                text: text,
                createdAt: serverTimestamp()
            });

            // Update the chat document so it floats to the top of the sidebar
            await updateDoc(doc(db, "chats", activeChatId), {
                updatedAt: serverTimestamp(),
                lastMessage: text
            });
        };

        window.handleFileUpload = async function(e) {
            const file = e.target.files[0];
            if (file && activeChatId) {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    const base64Img = event.target.result;
                    const msgText = `<img src="${base64Img}" style="max-width:100%; border-radius:8px; margin-bottom:5px;"><br>📎 Attached: ${file.name}`;
                    
                    await addDoc(collection(db, "chats", activeChatId, "messages"), {
                        sender: currentUser,
                        text: msgText,
                        createdAt: serverTimestamp()
                    });

                    await updateDoc(doc(db, "chats", activeChatId), {
                        updatedAt: serverTimestamp(),
                        lastMessage: `📎 Image Attached`
                    });
                };
                reader.readAsDataURL(file); // Encode image to string for Firestore
            }
        };

        // --- NEW CHAT CREATION ---
        window.createChat = async function() {
            if(groupMembers.length === 0) return;
            const isGroup = groupMembers.length > 1;
            const groupName = document.getElementById('new-group-name').value.trim() || "New Group";

            // Create new chat doc in Firestore
            const chatRef = await addDoc(collection(db, "chats"), {
                participants: [currentUser, ...groupMembers],
                isGroup: isGroup,
                name: isGroup ? groupName : "",
                pic: tempPicData,
                updatedAt: serverTimestamp(),
                lastMessage: "Chat created"
            });

            toggleModal('new-chat-modal', false);
            openChat(chatRef.id);
        };

        // --- PROFILE EDITING ---
        window.saveProfileEdit = async function() {
            const fname = document.getElementById('edit-fname').value.trim();
            const lname = document.getElementById('edit-lname').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();

            await updateDoc(doc(db, "users", currentUser), {
                fname: fname, lname: lname, bio: bio, pic: tempPicData
            });

            usersCache[currentUser] = { ...usersCache[currentUser], fname, lname, bio, pic: tempPicData };
            document.getElementById('my-profile-icon').innerHTML = getAvatarHTML(currentUser, usersCache[currentUser]);
            
            toggleModal('profile-modal', false);
        };

        // --- GROUP EDITING ---
        window.saveGroupDetails = async function() {
            const newName = document.getElementById('gd-name').value.trim() || "Unnamed Group";
            await updateDoc(doc(db, "chats", editingGroupChatId), {
                name: newName,
                pic: tempPicData,
                updatedAt: serverTimestamp()
            });
            toggleModal('group-details-modal', false);
        };

        window.kickUser = async function(username) {
            await updateDoc(doc(db, "chats", editingGroupChatId), {
                participants: arrayRemove(username),
                updatedAt: serverTimestamp()
            });
            
            // Log it in messages
            await addDoc(collection(db, "chats", editingGroupChatId, "messages"), {
                sender: "System",
                text: `${getFullName(username)} was removed from the group.`,
                createdAt: serverTimestamp()
            });
            
            toggleModal('group-details-modal', false);
        };

        // --- UI HELPERS (Mapped to window for HTML access) ---
        window.handleEnter = function(e, type) {
            if (e.key === 'Enter') {
                if (type === 'auth-login') window.authenticate('login');
                if (type === 'send') window.sendMsg();
            }
        };

        window.getFullName = function(username) {
            const p = usersCache[username];
            return p ? `${p.fname} ${p.lname}`.trim() : username;
        };

        window.getAvatarHTML = function(username, profileObj) {
            const p = profileObj || usersCache[username];
            if (p && p.pic) return `<img src="${p.pic}">`;
            return username.charAt(0).toUpperCase();
        };

        window.toggleModal = function(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
            if (!show) {
                if (id === 'new-chat-modal') {
                    document.getElementById('user-search').value = '';
                    document.getElementById('search-dropdown').style.display = 'none';
                    document.getElementById('selected-users').innerHTML = '';
                    document.getElementById('new-group-settings').style.display = 'none';
                    document.getElementById('new-group-name').value = '';
                    document.getElementById('group-pic-preview').innerHTML = 'G';
                    groupMembers = [];
                    tempPicData = null;
                }
                if (id === 'profile-modal') {
                    document.getElementById('edit-profile-form').style.display = 'none';
                    document.getElementById('pv-bio').style.display = 'block';
                    document.getElementById('pv-save-btn').style.display = 'none';
                }
            }
        };

        window.viewProfile = function(username) {
            const profile = usersCache[username];
            if (!profile) return;
            
            document.getElementById('pv-pic').innerHTML = getAvatarHTML(username, profile);
            document.getElementById('pv-name').innerText = getFullName(username);
            document.getElementById('pv-handle').innerText = `@${username}`;
            document.getElementById('pv-bio').innerText = profile.bio || "No bio available.";
            
            const isMe = (username === currentUser);
            document.getElementById('pv-edit-btn').style.display = isMe ? 'inline-block' : 'none';
            tempPicData = profile.pic || null; 

            window.toggleModal('profile-modal', true);
        };

        window.enableProfileEdit = function() {
            const profile = usersCache[currentUser];
            document.getElementById('pv-bio').style.display = 'none';
            document.getElementById('pv-edit-btn').style.display = 'none';
            document.getElementById('edit-profile-form').style.display = 'block';
            document.getElementById('pv-save-btn').style.display = 'inline-block';
            
            document.getElementById('edit-fname').value = profile.fname || "";
            document.getElementById('edit-lname').value = profile.lname || "";
            document.getElementById('edit-bio').value = profile.bio || "";
        };

        window.handleSearchInput = function(e) {
            const val = e.target.value.trim().toLowerCase();
            const dropdown = document.getElementById('search-dropdown');
            if (!val) { dropdown.style.display = 'none'; return; }

            const matches = usersDirectory.filter(u => u.includes(val) && u !== currentUser && !groupMembers.includes(u));

            if (matches.length > 0) {
                dropdown.innerHTML = matches.map(u => `
                    <div class="search-result" onclick="addSelectedUser('${u}')">
                        <div style="width:30px;height:30px;border-radius:50%;background:var(--border-light);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--text-dark);font-weight:bold;">${getAvatarHTML(u)}</div>
                        <div><div style="font-weight:bold;">${getFullName(u)}</div><div style="font-size:12px; color:var(--text-muted);">@${u}</div></div>
                    </div>`).join('');
                dropdown.style.display = 'block';
            } else {
                dropdown.innerHTML = `<div class="search-result" style="color:var(--text-muted); cursor:default;">No users found</div>`;
                dropdown.style.display = 'block';
            }
        };

        window.addSelectedUser = function(username) {
            if(username && !groupMembers.includes(username)) {
                groupMembers.push(username);
                const pill = document.createElement('span');
                pill.className = 'user-pill';
                pill.innerHTML = `@${username} <span style="margin-left: 8px; cursor: pointer;" onclick="removeUserPill('${username}', this)">✕</span>`;
                document.getElementById('selected-users').appendChild(pill);
                document.getElementById('new-group-settings').style.display = groupMembers.length > 1 ? 'block' : 'none';
            }
            document.getElementById('user-search').value = '';
            document.getElementById('search-dropdown').style.display = 'none';
        };

        window.removeUserPill = function(username, element) {
            groupMembers = groupMembers.filter(u => u !== username);
            element.parentElement.remove();
            document.getElementById('new-group-settings').style.display = groupMembers.length > 1 ? 'block' : 'none';
        };

        window.openGroupDetails = function(chatId) {
            editingGroupChatId = chatId;
            const chat = chatsCache.find(c => c.id === chatId);
            
            document.getElementById('gd-pic').innerHTML = chat.pic ? `<img src="${chat.pic}">` : chat.name.charAt(0).toUpperCase();
            document.getElementById('gd-name').value = chat.name;
            tempPicData = chat.pic;

            const list = document.getElementById('gd-members-list');
            list.innerHTML = chat.participants.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border-light);">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="width:30px;height:30px;border-radius:50%;background:var(--border-dark);color:var(--bg-main);display:flex;justify-content:center;align-items:center;font-weight:bold;overflow:hidden;">${getAvatarHTML(p)}</div>
                        <span style="font-weight:bold; font-size:14px;">${getFullName(p)}</span>
                    </div>
                    ${p !== currentUser ? `<button class="kick-btn" onclick="kickUser('${p}')">Remove</button>` : `<span style="font-size:12px; color:var(--text-muted);">You</span>`}
                </div>
            `).join('');

            toggleModal('group-details-modal', true);
        };

        window.handleGroupPicEdit = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    tempPicData = event.target.result;
                    document.getElementById('gd-pic').innerHTML = `<img src="${tempPicData}">`;
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
